<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#004bf2">
  <meta name="description" content="Acceso a la demo temporal de Membora.">
  <title>Demo temporal - Membora</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/site.css">
</head>
<body class="demo-entry-body">
  <main class="demo-entry-card">
    <a class="brand" href="index.html" aria-label="Membora">
      <img class="brand-logo" src="assets/membora-logo.svg" alt="Membora">
      <span>
        <small>Demo temporal</small>
      </span>
    </a>
    <h1>Abriendo demo de Membora</h1>
    <p>Te llevaremos a una sesión de prueba con datos demo. La sesión dura 20 minutos y despues volveras automaticamente a esta web.</p>
    <form method="post" action="https://app.crm.josehurtado.dev/index.php?route=login" data-demo-entry-form>
      <input type="hidden" name="action" value="demo_login">
      <input type="hidden" name="demo_type" value="client">
      <button class="primary-link" type="submit">Entrar en la demo</button>
    </form>
    <a class="outline-link" href="index.html">Volver a la web</a>
  </main>
  <script>
    document.querySelector('[data-demo-entry-form]')?.submit();
  </script>
</body>
</html>
